version: "3.9"
services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - APP_ENV=local
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
  chroma:
    image: chromadb/chromadb:latest
    ports:
      - "8001:8001"
    command: ["chroma", "serve", "--host", "0.0.0.0"]
